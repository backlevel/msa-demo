server:
  port: 8888

spring:
  application:
    name: config-server
  profiles:
    active: native          # Git 대신 로컬 파일 사용 (개발 환경)
  cloud:
    config:
      server:
        native:
          search-locations: classpath:/configs

management:
  endpoints:
    web:
      exposure:
        include: health, info
