server:
  port: 8090

spring:
  application:
    name: AI-SERVICE
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 2000ms

# Gemini API 설정
gemini:
  api:
    key: ${GEMINI_API_KEY:your-gemini-api-key}
    url: https://generativelanguage.googleapis.com/v1beta/models/gemini-pro:generateContent
    model: gemini-pro
    max-tokens: 1024

# Slack 설정
slack:
  bot-token: ${SLACK_BOT_TOKEN:your-slack-bot-token}
  channel: ${SLACK_CHANNEL:#customer-support}

# RAG 설정
rag:
  context-ttl-minutes: 30        # 대화 컨텍스트 유지 시간
  max-context-messages: 10       # 최대 컨텍스트 메시지 수
  similarity-threshold: 0.7      # 유사도 임계값

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_SERVER:http://localhost:8761/eureka/}
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${random.value}

management:
  endpoints:
    web:
      exposure:
        include: health, info

logging:
  pattern:
    level: "%5p [${spring.application.name:},%X{traceId:-},%X{spanId:-}]"
  level:
    com.example.ai: DEBUG

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: ai-service-group
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      auto-offset-reset: latest
      properties:
        spring.json.trusted.packages: "com.example.*"
        spring.json.use.type.headers: false
        spring.json.value.default.type: "java.util.Map"
