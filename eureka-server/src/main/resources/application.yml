server:
  port: 8761

spring:
  application:
    name: eureka-server

eureka:
  client:
    register-with-eureka: false   # 자기 자신은 등록 안 함
    fetch-registry: false
  server:
    wait-time-in-ms-when-sync-empty: 0  # 개발 환경: 시작 지연 없음

management:
  endpoints:
    web:
      exposure:
        include: health, info
