# ============================================================
# .gitlab-ci.yml  ─  MSA Demo CI/CD 파이프라인
#
# 스테이지:
#   test   → Gradle 단위 테스트
#   build  → Docker 이미지 빌드
#   push   → AWS ECR 업로드
#   deploy → AWS ECS 롤링 업데이트
#
# GitLab Variables (Settings > CI/CD > Variables) 설정 필요:
#   AWS_ACCESS_KEY_ID      : IAM 액세스 키
#   AWS_SECRET_ACCESS_KEY  : IAM 시크릿 키
#   AWS_REGION             : ap-northeast-2
#   AWS_ACCOUNT_ID         : 123456789012
#   ECR_REGISTRY           : ${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com
#   SLACK_WEBHOOK_URL      : Slack Incoming Webhook URL
# ============================================================

image: eclipse-temurin:17-jdk-alpine

variables:
  GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.caching=true"
  DOCKER_DRIVER: overlay2
  SERVICES: "order-service user-service product-service api-gateway eureka-server config-server ai-service"

# 스테이지 순서 정의
stages:
  - test
  - build
  - push
  - deploy

# ── 캐시 공통 설정 ──────────────────────────────────────────
.gradle_cache: &gradle_cache
  cache:
    key: "$CI_COMMIT_REF_SLUG-gradle"
    paths:
      - .gradle/wrapper
      - .gradle/caches
      - ~/.gradle/caches

# ── 브랜치 규칙 ─────────────────────────────────────────────
# main   → 전체 파이프라인 실행 (운영 배포)
# develop → test + build 까지만
# feature/* → test 만

# ============================================================
# STAGE 1: test
# ============================================================
test:
  stage: test
  <<: *gradle_cache
  script:
    - chmod +x gradlew
    - ./gradlew test --parallel --continue
  artifacts:
    when: always
    reports:
      junit:
        - "*/build/test-results/test/TEST-*.xml"
    paths:
      - "*/build/reports/tests/"
    expire_in: 7 days
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH =~ /^(main|develop|feature\/.*)$/'

# ============================================================
# STAGE 2: build  (develop, main 브랜치만)
# ============================================================
.build_template: &build_template
  stage: build
  image: docker:24
  services:
    - docker:24-dind
  before_script:
    - apk add --no-cache curl
    - docker info
  rules:
    - if: '$CI_COMMIT_BRANCH =~ /^(main|develop)$/'

build:order-service:
  <<: *build_template
  script:
    - docker build
        --build-arg SERVICE=order-service
        -f order-service/Dockerfile
        -t order-service:$CI_COMMIT_SHORT_SHA .
    - docker save order-service:$CI_COMMIT_SHORT_SHA > order-service.tar
  artifacts:
    paths: [order-service.tar]
    expire_in: 1 hour

build:user-service:
  <<: *build_template
  script:
    - docker build -f user-service/Dockerfile -t user-service:$CI_COMMIT_SHORT_SHA .
    - docker save user-service:$CI_COMMIT_SHORT_SHA > user-service.tar
  artifacts:
    paths: [user-service.tar]
    expire_in: 1 hour

build:product-service:
  <<: *build_template
  script:
    - docker build -f product-service/Dockerfile -t product-service:$CI_COMMIT_SHORT_SHA .
    - docker save product-service:$CI_COMMIT_SHORT_SHA > product-service.tar
  artifacts:
    paths: [product-service.tar]
    expire_in: 1 hour

build:ai-service:
  <<: *build_template
  script:
    - docker build -f ai-service/Dockerfile -t ai-service:$CI_COMMIT_SHORT_SHA .
    - docker save ai-service:$CI_COMMIT_SHORT_SHA > ai-service.tar
  artifacts:
    paths: [ai-service.tar]
    expire_in: 1 hour

# ============================================================
# STAGE 3: push to ECR  (main 브랜치만)
# ============================================================
.push_template: &push_template
  stage: push
  image: docker:24
  services:
    - docker:24-dind
  before_script:
    # AWS CLI 설치 + ECR 로그인
    - apk add --no-cache aws-cli
    - aws ecr get-login-password --region $AWS_REGION |
        docker login --username AWS --password-stdin $ECR_REGISTRY
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'

push:order-service:
  <<: *push_template
  needs: [build:order-service]
  script:
    - docker load < order-service.tar
    - docker tag order-service:$CI_COMMIT_SHORT_SHA $ECR_REGISTRY/order-service:$CI_COMMIT_SHORT_SHA
    - docker tag order-service:$CI_COMMIT_SHORT_SHA $ECR_REGISTRY/order-service:latest
    - docker push $ECR_REGISTRY/order-service:$CI_COMMIT_SHORT_SHA
    - docker push $ECR_REGISTRY/order-service:latest

push:user-service:
  <<: *push_template
  needs: [build:user-service]
  script:
    - docker load < user-service.tar
    - docker tag user-service:$CI_COMMIT_SHORT_SHA $ECR_REGISTRY/user-service:$CI_COMMIT_SHORT_SHA
    - docker tag user-service:$CI_COMMIT_SHORT_SHA $ECR_REGISTRY/user-service:latest
    - docker push $ECR_REGISTRY/user-service:$CI_COMMIT_SHORT_SHA
    - docker push $ECR_REGISTRY/user-service:latest

push:product-service:
  <<: *push_template
  needs: [build:product-service]
  script:
    - docker load < product-service.tar
    - docker tag product-service:$CI_COMMIT_SHORT_SHA $ECR_REGISTRY/product-service:$CI_COMMIT_SHORT_SHA
    - docker tag product-service:$CI_COMMIT_SHORT_SHA $ECR_REGISTRY/product-service:latest
    - docker push $ECR_REGISTRY/product-service:$CI_COMMIT_SHORT_SHA
    - docker push $ECR_REGISTRY/product-service:latest

push:ai-service:
  <<: *push_template
  needs: [build:ai-service]
  script:
    - docker load < ai-service.tar
    - docker tag ai-service:$CI_COMMIT_SHORT_SHA $ECR_REGISTRY/ai-service:$CI_COMMIT_SHORT_SHA
    - docker tag ai-service:$CI_COMMIT_SHORT_SHA $ECR_REGISTRY/ai-service:latest
    - docker push $ECR_REGISTRY/ai-service:$CI_COMMIT_SHORT_SHA
    - docker push $ECR_REGISTRY/ai-service:latest

# ============================================================
# STAGE 4: deploy to ECS  (main 브랜치만, 수동 승인)
# ============================================================
.deploy_template: &deploy_template
  stage: deploy
  image: registry.gitlab.com/gitlab-org/cloud-deploy/aws-base:latest
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
      when: manual       # 수동 승인 후 배포
      allow_failure: false

deploy:order-service:
  <<: *deploy_template
  needs: [push:order-service]
  script:
    - !reference [.scripts, ecs_deploy]
  variables:
    SERVICE_NAME: order-service
    ECS_CLUSTER: msa-demo-cluster
    ECS_SERVICE: order-service

deploy:user-service:
  <<: *deploy_template
  needs: [push:user-service]
  script:
    - !reference [.scripts, ecs_deploy]
  variables:
    SERVICE_NAME: user-service
    ECS_CLUSTER: msa-demo-cluster
    ECS_SERVICE: user-service

deploy:product-service:
  <<: *deploy_template
  needs: [push:product-service]
  script:
    - !reference [.scripts, ecs_deploy]
  variables:
    SERVICE_NAME: product-service
    ECS_CLUSTER: msa-demo-cluster
    ECS_SERVICE: product-service

deploy:ai-service:
  <<: *deploy_template
  needs: [push:ai-service]
  script:
    - !reference [.scripts, ecs_deploy]
  variables:
    SERVICE_NAME: ai-service
    ECS_CLUSTER: msa-demo-cluster
    ECS_SERVICE: ai-service

# ── 공통 스크립트 ────────────────────────────────────────────
.scripts:
  ecs_deploy:
    - |
      echo "== ECS 태스크 정의 업데이트 =="

      # 현재 태스크 정의 조회
      TASK_DEF=$(aws ecs describe-task-definition \
        --task-definition $SERVICE_NAME \
        --region $AWS_REGION \
        --query 'taskDefinition' \
        --output json)

      # 새 이미지로 컨테이너 정의 업데이트
      NEW_IMAGE="$ECR_REGISTRY/$SERVICE_NAME:$CI_COMMIT_SHORT_SHA"
      NEW_TASK_DEF=$(echo $TASK_DEF | \
        python3 -c "
      import json,sys
      t=json.load(sys.stdin)
      for c in t['containerDefinitions']:
          if c['name']=='$SERVICE_NAME':
              c['image']='$NEW_IMAGE'
      for k in ['taskDefinitionArn','revision','status','requiresAttributes',
                'compatibilities','registeredAt','registeredBy']:
          t.pop(k,None)
      print(json.dumps(t))")

      # 새 태스크 정의 등록
      NEW_REVISION=$(aws ecs register-task-definition \
        --region $AWS_REGION \
        --cli-input-json "$NEW_TASK_DEF" \
        --query 'taskDefinition.revision' \
        --output text)

      echo "새 태스크 정의 등록: revision=$NEW_REVISION"

      # ECS 서비스 롤링 업데이트
      aws ecs update-service \
        --cluster $ECS_CLUSTER \
        --service $ECS_SERVICE \
        --task-definition "$SERVICE_NAME:$NEW_REVISION" \
        --region $AWS_REGION \
        --force-new-deployment

      echo "== 배포 완료 대기 =="
      aws ecs wait services-stable \
        --cluster $ECS_CLUSTER \
        --services $ECS_SERVICE \
        --region $AWS_REGION

      echo "== 배포 완료: $SERVICE_NAME:$NEW_REVISION =="

# ── Slack 알림 (성공/실패 공통) ──────────────────────────────
notify:success:
  stage: deploy
  image: alpine:latest
  needs: [deploy:order-service, deploy:user-service, deploy:product-service, deploy:ai-service]
  script:
    - apk add --no-cache curl
    - |
      curl -s -X POST "$SLACK_WEBHOOK_URL" \
        -H 'Content-type: application/json' \
        --data "{
          \"text\": \":white_check_mark: *배포 성공*\n프로젝트: $CI_PROJECT_NAME\n브랜치: $CI_COMMIT_BRANCH\n커밋: $CI_COMMIT_SHORT_SHA\n파이프라인: $CI_PIPELINE_URL\"
        }"
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
      when: on_success

notify:failure:
  stage: deploy
  image: alpine:latest
  script:
    - apk add --no-cache curl
    - |
      curl -s -X POST "$SLACK_WEBHOOK_URL" \
        -H 'Content-type: application/json' \
        --data "{
          \"text\": \":x: *배포 실패*\n프로젝트: $CI_PROJECT_NAME\n브랜치: $CI_COMMIT_BRANCH\n커밋: $CI_COMMIT_SHORT_SHA\n파이프라인: $CI_PIPELINE_URL\"
        }"
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
      when: on_failure
