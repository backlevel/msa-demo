input {
  beats {
    port => 5044
  }
}

filter {
  # Spring Boot 로그 파싱
  if [fields][service] {
    mutate {
      add_field => { "service_name" => "%{[fields][service]}" }
    }
  }

  # Spring Boot JSON 로그 파싱
  if [message] =~ /^\{/ {
    json {
      source => "message"
      target => "parsed"
    }
    mutate {
      rename => {
        "[parsed][level]"        => "level"
        "[parsed][logger_name]"  => "logger"
        "[parsed][message]"      => "log_message"
        "[parsed][stack_trace]"  => "stack_trace"
        "[parsed][traceId]"      => "trace_id"
        "[parsed][spanId]"       => "span_id"
      }
    }
  } else {
    # 일반 텍스트 로그 파싱 (Spring Boot 기본 포맷)
    grok {
      match => {
        "message" => "%{TIMESTAMP_ISO8601:log_timestamp}\s+%{LOGLEVEL:level}\s+\[%{DATA:service_name},%{DATA:trace_id},%{DATA:span_id}\]\s+%{NUMBER:pid}\s+---\s+\[%{DATA:thread}\]\s+%{DATA:logger}\s+:\s+%{GREEDYDATA:log_message}"
      }
    }
  }

  # 타임스탬프 파싱
  if [log_timestamp] {
    date {
      match => ["log_timestamp", "ISO8601"]
      target => "@timestamp"
    }
  }

  # 에러 레벨 태그 추가
  if [level] == "ERROR" {
    mutate { add_tag => ["error"] }
  }
  if [level] == "WARN" {
    mutate { add_tag => ["warning"] }
  }

  # 불필요한 필드 제거
  mutate {
    remove_field => ["agent", "ecs", "input", "log", "parsed"]
  }
}

output {
  elasticsearch {
    hosts => ["elasticsearch:9200"]
    index => "msa-logs-%{+YYYY.MM.dd}"
    # 서비스별 인덱스 분리
    # index => "msa-%{service_name}-%{+YYYY.MM.dd}"
  }

  # 디버그용 stdout (운영 시 제거)
  # stdout { codec => rubydebug }
}
