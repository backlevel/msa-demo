apiVersion: 1

datasources:
  # Thanos Query - 장기 메트릭 (Prometheus 대신 Thanos로 단일 쿼리)
  - name: Thanos
    type: prometheus
    access: proxy
    url: http://thanos-query:10902
    isDefault: true
    editable: true
    jsonData:
      timeInterval: "15s"
      queryTimeout: "60s"
      httpMethod: POST

  # Prometheus - 단기 실시간 메트릭 (직접 접근)
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    editable: true
    jsonData:
      timeInterval: "15s"

  # Elasticsearch - 로그 분석
  - name: Elasticsearch
    type: elasticsearch
    access: proxy
    url: http://elasticsearch:9200
    editable: true
    jsonData:
      index: msa-logs-*
      timeField: "@timestamp"
      esVersion: "8.0.0"
      logMessageField: message
      logLevelField: level
