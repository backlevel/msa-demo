global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: msa-demo
    replica: prometheus-1

# Thanos sidecar용 remote_write 설정
# (Thanos가 sidecar 방식으로 블록 업로드)
rule_files: []

scrape_configs:
  # Prometheus 자기 자신
  - job_name: prometheus
    static_configs:
      - targets: [localhost:9090]

  # API Gateway
  - job_name: api-gateway
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: [api-gateway:8080]
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: api-gateway

  # User Service
  - job_name: user-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: [user-service:8080]
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: user-service

  # Order Service
  - job_name: order-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: [order-service:8080]
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: order-service

  # Product Service
  - job_name: product-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: [product-service:8080]
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: product-service

  # AI Service
  - job_name: ai-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: [ai-service:8090]
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: ai-service

  # Eureka Server
  - job_name: eureka-server
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: [eureka-server:8761]
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: eureka-server

  # Kafka Exporter (JMX metrics)
  - job_name: kafka
    static_configs:
      - targets: [kafka-exporter:9308]

  # Redis Exporter
  - job_name: redis
    static_configs:
      - targets: [redis-exporter:9121]
