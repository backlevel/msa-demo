global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: msa-demo
    replica: prometheus-1

rule_files: []

scrape_configs:
  # ── Prometheus 자기 자신 ──────────────────────────────────
  - job_name: prometheus
    static_configs:
      - targets: [localhost:9090]

  # ════════════════════════════════════════════════════════
  # Eureka 서비스 디스커버리 (랜덤 포트 서비스 대응)
  #
  # Prometheus eureka_sd 동작 방식:
  #   1. Eureka /apps API 폴링
  #   2. 각 인스턴스의 __meta_eureka_app_instance_ip_addr
  #      + __meta_eureka_app_instance_port 를 읽어옴
  #      → 이 포트가 Eureka에 등록된 실제 랜덤 포트
  #   3. relabel로 __address__ = ip:port 조합
  #   4. __metrics_path__ = /actuator/prometheus 설정
  # ════════════════════════════════════════════════════════
  - job_name: spring-eureka
    eureka_sd_configs:
      - server: http://eureka-server:8761/eureka
        refresh_interval: 15s

    relabel_configs:
      # UP 상태인 인스턴스만 수집
      - source_labels: [__meta_eureka_app_instance_status]
        regex: UP
        action: keep

      # __address__ = Eureka 등록 IP + 실제 포트
      # __meta_eureka_app_instance_port 는 Eureka XML의
      # <port enabled="true">35787</port> 에서 읽은 실제 랜덤 포트
      - source_labels: [__meta_eureka_app_instance_ip_addr,
                        __meta_eureka_app_instance_port]
        separator: ":"
        target_label: __address__

      # 메트릭 경로 고정
      - target_label: __metrics_path__
        replacement: /actuator/prometheus

      # job = 앱 이름 (대문자 → 그대로 사용)
      - source_labels: [__meta_eureka_app_name]
        target_label: job

      # application 레이블
      - source_labels: [__meta_eureka_app_name]
        target_label: application

      # instance 레이블 = instanceId
      - source_labels: [__meta_eureka_app_instance_id]
        target_label: instance

  # ════════════════════════════════════════════════════════
  # Static 스크랩 (Eureka SD 보완 - 고정 포트 서비스)
  # eureka-server 자신은 eureka_sd에 안 잡히므로 별도 처리
  # ════════════════════════════════════════════════════════
  - job_name: eureka-server
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: [eureka-server:8761]
        labels:
          application: eureka-server
          instance: eureka-server

  # ════════════════════════════════════════════════════════
  # 인프라 Exporter
  # ════════════════════════════════════════════════════════
  - job_name: kafka
    static_configs:
      - targets: [kafka-exporter:9308]
        labels:
          application: kafka

  - job_name: redis
    static_configs:
      - targets: [redis-exporter:9121]
        labels:
          application: redis
