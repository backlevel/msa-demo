services:
  # ════════════════════════════════════════════════════════
  # 인프라 레이어
  # ════════════════════════════════════════════════════════
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    networks: [msa-net]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 5

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    networks: [msa-net]
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "2181"]
      interval: 10s
      retries: 5

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    ports:
      - "19092:9092"
    depends_on:
      zookeeper:
        condition: service_healthy
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:19092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    networks: [msa-net]
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:19092"]
      interval: 15s
      retries: 8

  # ── Kafka UI (토픽/메시지/컨슈머 그룹 시각화) ─────────
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    ports:
      - "8989:8080"
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_CLUSTERS_0_NAME: msa-demo
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
      KAFKA_CLUSTERS_0_ZOOKEEPER: zookeeper:2181
    networks: [msa-net]
    profiles: ["monitoring"]

  # ── Kafka JMX Exporter (Prometheus 메트릭) ────────────
  kafka-exporter:
    image: danielqsj/kafka-exporter:latest
    ports:
      - "9308:9308"
    command:
      - --kafka.server=kafka:29092
    depends_on:
      kafka:
        condition: service_healthy
    networks: [msa-net]
    profiles: ["monitoring"]

  # ── Redis Exporter (Prometheus 메트릭) ────────────────
  redis-exporter:
    image: oliver006/redis_exporter:latest
    ports:
      - "19121:9121"
    environment:
      REDIS_ADDR: redis:6379
    depends_on:
      redis:
        condition: service_healthy
    networks: [msa-net]
    profiles: ["monitoring"]

  # ════════════════════════════════════════════════════════
  # Prometheus + Thanos 레이어
  # ════════════════════════════════════════════════════════

  # MinIO - Thanos 장기 저장소 (S3 호환)
  minio:
    image: minio/minio:latest
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio-data:/data
    networks: [msa-net]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      retries: 5
    profiles: ["monitoring"]

  # MinIO 버킷 초기화
  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set myminio http://minio:9000 minioadmin minioadmin;
      mc mb myminio/thanos --ignore-existing;
      echo 'Bucket created';
      "
    networks: [msa-net]
    profiles: ["monitoring"]

  # Prometheus
  prometheus:
    image: prom/prometheus:latest
    ports:
      - "19090:9090"
    volumes:
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=2h          # 로컬 2시간만 보관 (Thanos로 이전)
      - --storage.tsdb.min-block-duration=2h
      - --storage.tsdb.max-block-duration=2h
      - --web.enable-lifecycle
      - --web.enable-admin-api
    networks: [msa-net]
    profiles: ["monitoring"]

  # Thanos Sidecar - Prometheus 데이터를 MinIO로 업로드
  thanos-sidecar:
    image: quay.io/thanos/thanos:v0.35.0
    command:
      - sidecar
      - --tsdb.path=/prometheus
      - --prometheus.url=http://prometheus:9090
      - --grpc-address=0.0.0.0:10901
      - --http-address=0.0.0.0:10902
      - --objstore.config-file=/etc/thanos/bucket.yml
    volumes:
      - prometheus-data:/prometheus:ro
      - ./observability/thanos/bucket.yml:/etc/thanos/bucket.yml:ro
    depends_on:
      - prometheus
      - minio-init
    networks: [msa-net]
    profiles: ["monitoring"]

  # Thanos Store - MinIO에서 장기 데이터 서빙
  thanos-store:
    image: quay.io/thanos/thanos:v0.35.0
    command:
      - store
      - --grpc-address=0.0.0.0:10901
      - --http-address=0.0.0.0:10902
      - --objstore.config-file=/etc/thanos/bucket.yml
      - --data-dir=/var/thanos/store
    volumes:
      - ./observability/thanos/bucket.yml:/etc/thanos/bucket.yml:ro
      - thanos-store-data:/var/thanos/store
    depends_on:
      - minio-init
    networks: [msa-net]
    profiles: ["monitoring"]

  # Thanos Query - 단일 쿼리 엔드포인트 (Prometheus + Store 통합)
  thanos-query:
    image: quay.io/thanos/thanos:v0.35.0
    ports:
      - "10902:10902"
    command:
      - query
      - --grpc-address=0.0.0.0:10901
      - --http-address=0.0.0.0:10902
      - --endpoint=thanos-sidecar:10901
      - --endpoint=thanos-store:10901
      - --query.replica-label=replica
    depends_on:
      - thanos-sidecar
      - thanos-store
    networks: [msa-net]
    profiles: ["monitoring"]

  # Thanos Compactor - 블록 압축 및 다운샘플링
  thanos-compactor:
    image: quay.io/thanos/thanos:v0.35.0
    command:
      - compact
      - --wait
      - --objstore.config-file=/etc/thanos/bucket.yml
      - --data-dir=/var/thanos/compact
      - --retention.resolution-raw=30d
      - --retention.resolution-5m=90d
      - --retention.resolution-1h=1y
    volumes:
      - ./observability/thanos/bucket.yml:/etc/thanos/bucket.yml:ro
      - thanos-compact-data:/var/thanos/compact
    depends_on:
      - minio-init
    networks: [msa-net]
    profiles: ["monitoring"]

  # Grafana
  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_FEATURE_TOGGLES_ENABLE: traceqlEditor
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./observability/grafana/dashboards:/etc/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
      - thanos-query
    networks: [msa-net]
    profiles: ["monitoring"]

  # ════════════════════════════════════════════════════════
  # ELK 스택 (로그 수집/분석)
  # ════════════════════════════════════════════════════════

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
    ports:
      - "19200:9200"
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"       # 개발 환경 - 보안 비활성화
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"
    volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data
    networks: [msa-net]
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s
    profiles: ["logging"]

  logstash:
    image: docker.elastic.co/logstash/logstash:8.11.0
    ports:
      - "5044:5044"
      - "9600:9600"
    volumes:
      - ./observability/logstash/pipeline/logstash.conf:/usr/share/logstash/pipeline/logstash.conf:ro
    environment:
      LS_JAVA_OPTS: "-Xms256m -Xmx256m"
    depends_on:
      elasticsearch:
        condition: service_healthy
    networks: [msa-net]
    profiles: ["logging"]

  kibana:
    image: docker.elastic.co/kibana/kibana:8.11.0
    ports:
      - "5601:5601"
    environment:
      ELASTICSEARCH_HOSTS: http://elasticsearch:9200
    depends_on:
      elasticsearch:
        condition: service_healthy
    networks: [msa-net]
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:5601/api/status || exit 1"]
      interval: 15s
      retries: 10
      start_period: 90s
    profiles: ["logging"]

  filebeat:
    image: docker.elastic.co/beats/filebeat:8.11.0
    # --strict.perms=false 옵션을 추가하여 권한 체크를 비활성화합니다.
    command: [ "--strict.perms=false", "-e" ]
    user: root
    volumes:
      - ./observability/filebeat/filebeat.yml:/usr/share/filebeat/filebeat.yml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      - logstash
    networks: [msa-net]
    profiles: ["logging"]

  # ════════════════════════════════════════════════════════
  # Zipkin 분산 추적 (선택)
  # ════════════════════════════════════════════════════════
  zipkin:
    image: openzipkin/zipkin
    ports:
      - "19411:9411"
    networks: [msa-net]
    profiles: ["tracing"]

  # ════════════════════════════════════════════════════════
  # Spring Boot 서비스 레이어
  # ════════════════════════════════════════════════════════
  config-server:
    build:
      context: .
      dockerfile: config-server/Dockerfile
    ports:
      - "8888:8888"
    networks: [msa-net]

  eureka-server:
    build:
      context: .
      dockerfile: eureka-server/Dockerfile
    ports:
      - "8761:8761"
    networks: [msa-net]
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8761/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s

  api-gateway:
    build:
      context: .
      dockerfile: api-gateway/Dockerfile
    ports:
      - "8080:8080"
    networks: [msa-net]
    depends_on:
      eureka-server:
        condition: service_healthy
    environment:
      - EUREKA_SERVER=http://eureka-server:8761/eureka/

  user-service:
    build:
      context: .
      dockerfile: user-service/Dockerfile
    networks: [msa-net]
    depends_on:
      eureka-server:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      - EUREKA_SERVER=http://eureka-server:8761/eureka/
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092

  order-service:
    build:
      context: .
      dockerfile: order-service/Dockerfile
    networks: [msa-net]
    depends_on:
      eureka-server:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      - EUREKA_SERVER=http://eureka-server:8761/eureka/
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092

  product-service:
    build:
      context: .
      dockerfile: product-service/Dockerfile
    networks: [msa-net]
    depends_on:
      eureka-server:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      - EUREKA_SERVER=http://eureka-server:8761/eureka/
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092

  ai-service:
    build:
      context: .
      dockerfile: ai-service/Dockerfile
    ports:
      - "8090:8090"
    networks: [msa-net]
    depends_on:
      eureka-server:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      - EUREKA_SERVER=http://eureka-server:8761/eureka/
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - GEMINI_API_KEY=${GEMINI_API_KEY:-your-gemini-api-key}
      - SLACK_BOT_TOKEN=${SLACK_BOT_TOKEN:-your-slack-bot-token}
      - SLACK_CHANNEL=${SLACK_CHANNEL:-#customer-support}
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092

networks:
  msa-net:
    driver: bridge

volumes:
  prometheus-data:
  grafana-data:
  elasticsearch-data:
  minio-data:
  thanos-store-data:
  thanos-compact-data:
